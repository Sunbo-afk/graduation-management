<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <style>
            color: rgba(255,255,255,.7);
            text-decoration: none;
            padding: 10px 20px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a.active {
            
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <!-- Admin Sidebar -->
    <div th:fragment="sidebar-admin" class="sidebar" style="position:fixed;top:0;left:0;width:250px;height:100vh;background:#2c3e50;padding-top:60px;">
        <div style="color:#7f8c8d;font-size:0.85rem;padding:15px 20px 5px;text-transform:uppercase;letter-spacing:1px;">管理功能</div>
        <a href="/admin/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/admin/departments"><i class="bi bi-building me-2"></i>系管理</a>
        <a href="/admin/majors"><i class="bi bi-book me-2"></i>专业管理</a>
        <a href="/admin/classes"><i class="bi bi-people me-2"></i>班级管理</a>
        <a href="/admin/users"><i class="bi bi-person-badge me-2"></i>用户管理</a>
        <a href="/admin/deadlines"><i class="bi bi-calendar-check me-2"></i>期限管理</a>
        <div style="color:#7f8c8d;font-size:0.85rem;padding:15px 20px 5px;text-transform:uppercase;letter-spacing:1px;">统计与维护</div>
        <a href="/admin/statistics"><i class="bi bi-bar-chart me-2"></i>统计分析</a>
        <a href="/admin/backup"><i class="bi bi-archive me-2"></i>数据库备份</a>
    </div>

    <!-- Student Sidebar -->
    <div th:fragment="sidebar-student" class="sidebar" style="position:fixed;top:0;left:0;width:250px;height:100vh;background:#27ae60;padding-top:60px;">
        <div style="color:#a9dfbf;font-size:0.85rem;padding:15px 20px 5px;text-transform:uppercase;letter-spacing:1px;">学生功能</div>
        <a href="/student/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/student/topics"><i class="bi bi-journal-text me-2"></i>浏览题目</a>
        <a href="/student/my-selection"><i class="bi bi-check-circle me-2"></i>我的选题</a>
        <a href="/student/reviews"><i class="bi bi-star me-2"></i>查看成绩</a>
    </div>

    <!-- Teacher Sidebar -->
    <div th:fragment="sidebar-teacher" class="sidebar" style="position:fixed;top:0;left:0;width:250px;height:100vh;background:#2980b9;padding-top:60px;">
        <div style="color:#aed6f1;font-size:0.85rem;padding:15px 20px 5px;text-transform:uppercase;letter-spacing:1px;">教师功能</div>
        <a href="/teacher/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/teacher/students"><i class="bi bi-people me-2"></i>指导学生</a>
        <a href="/teacher/topics"><i class="bi bi-journal-text me-2"></i>我的题目</a>
        <a href="/teacher/statistics"><i class="bi bi-bar-chart me-2"></i>统计分析</a>
    </div>
</body>
</html>
