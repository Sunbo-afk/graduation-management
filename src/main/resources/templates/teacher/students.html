<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指导学生 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        
        .stage-badge { font-size: 0.8rem; }
        .review-modal-body { max-height: 60vh; overflow-y: auto; }
        .submission-card { transition: 0.2s; border: 1px solid #e9ecef; }
        .submission-card:hover { border-color: #3498db; }
        .submission-card.selected { border-color: #2980b9; background-color: #ebf5fb; }
    </style>
</head>
<body>
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-primary me-3">教师</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
        </div>
    </nav>
    <div class="sidebar">
        <div class="nav-title">教师功能</div>
        <a href="/teacher/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/teacher/students" class="active"><i class="bi bi-people me-2"></i>指导学生</a>
        <a href="/teacher/topics"><i class="bi bi-journal-text me-2"></i>我的题目</a>
        <a href="/teacher/statistics"><i class="bi bi-bar-chart me-2"></i>统计分析</a>
    </div>
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0"><i class="bi bi-people me-2 text-primary"></i>指导学生</h3>
            <span class="badge bg-secondary" th:text="${studentList != null ? '共 ' + #lists.size(studentList) + ' 名学生' : '共 0 名学生'}">共 0 名学生</span>
        </div>

        <!-- No Students -->
        <div th:unless="${studentList != null and !studentList.isEmpty()}">
            <div class="text-center py-5">
                <i class="bi bi-people display-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">暂无指导学生</h5>
                <p class="text-muted">当学生选择您的题目后，将在此处显示</p>
            </div>
        </div>

        <!-- Students Table -->
        <div th:if="${studentList != null and !studentList.isEmpty()}">
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>学号</th>
                                    <th>姓名</th>
                                    <th>选题题目</th>
                                    <th>进度阶段</th>
                                    <th>最终成绩</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="stu : ${studentList}">
                                    <td th:text="${stu.studentNo}">学号</td>
                                    <td th:text="${stu.studentName}">姓名</td>
                                    <td>
                                        <span th:text="${stu.topicTitle}" style="max-width: 180px; display: inline-block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">题目</span>
                                    </td>
                                    <td>
                                        <span class="badge stage-badge"
                                              th:classappend="${stu.currentStage == '终稿' ? 'bg-success' : (stu.currentStage == '初稿' ? 'bg-info' : (stu.currentStage == '中期检查' ? 'bg-warning text-dark' : (stu.currentStage == '开题报告' ? 'bg-primary' : 'bg-secondary')))}"
                                              th:text="${stu.currentStage != null ? stu.currentStage : '未开始'}">阶段</span>
                                    </td>
                                    <td>
                                        <span th:if="${stu.finalScore != null}" class="fw-bold"
                                              th:classappend="${stu.finalScore >= 90 ? 'text-success' : (stu.finalScore >= 60 ? 'text-warning' : 'text-danger')}"
                                              th:text="${stu.finalScore}">分数</span>
                                        <span th:unless="${stu.finalScore != null}" class="text-muted">--</span>
                                    </td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <button class="btn btn-outline-primary" type="button"
                                                    th:attr="data-bs-toggle='modal',data-bs-target='#reviewModal' + ${stu.selectionId}"
                                                    onclick="loadSubmissions(this)" th:data-selection-id="${stu.selectionId}">
                                                <i class="bi bi-eye me-1"></i>审阅
                                            </button>
                                            <a th:href="@{/teacher/review(selectionId=${stu.selectionId})}" class="btn btn-outline-info btn-sm">
                                                <i class="bi bi-card-checklist me-1"></i>详情
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Review Modals for Each Student -->
            <div th:each="stu : ${studentList}">
                <div class="modal fade" th:id="'reviewModal' + ${stu.selectionId}" tabindex="-1"
                     th:aria-labelledby="'reviewModalLabel' + ${stu.selectionId}">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header bg-primary text-white">
                                <h5 class="modal-title" th:id="'reviewModalLabel' + ${stu.selectionId}">
                                    <i class="bi bi-person me-1"></i>
                                    审阅 - <span th:text="${stu.studentName}">学生</span>
                                    （<span th:text="${stu.topicTitle}">题目</span>）
                                </h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body review-modal-body">
                                <div th:if="${stu.submissions != null and !stu.submissions.isEmpty()}">
                                    <p class="text-muted small mb-3">
                                        <i class="bi bi-info-circle me-1"></i>请选择要审阅的提交文件
                                    </p>
                                    <div th:each="sub : ${stu.submissions}" class="submission-card card mb-3">
                                        <div class="card-body">
                                            <div class="row align-items-center">
                                                <div class="col-md-8">
                                                    <h6 class="mb-1">
                                                        <span class="badge bg-secondary me-1" th:text="${sub.stage}">阶段</span>
                                                        <span class="badge bg-light text-dark" th:text="${'v' + sub.version}">版本</span>
                                                    </h6>
                                                    <p class="mb-1 small text-muted" th:text="'提交时间：' + ${#temporals.format(sub.submitTime, 'yyyy-MM-dd HH:mm')}">时间</p>
                                                    <p class="mb-1 small" th:if="${sub.description != null}">
                                                        <i class="bi bi-card-text me-1"></i><span th:text="${sub.description}">说明</span>
                                                    </p>
                                                    <p class="mb-0 small">
                                                        <a th:href="${sub.filePath}" target="_blank" class="text-primary">
                                                            <i class="bi bi-file-earmark me-1"></i>查看文件
                                                        </a>
                                                    </p>
                                                    <!-- Existing review if any -->
                                                    <div th:if="${stu.reviewMap != null and stu.reviewMap.get(sub.submissionId) != null}" class="mt-2 p-2 bg-light rounded">
                                                        <small class="text-muted">
                                                            已有评分：<strong th:text="${stu.reviewMap.get(sub.submissionId).score}">分数</strong> |
                                                            评语：<span th:text="${stu.reviewMap.get(sub.submissionId).comment}">评语</span>
                                                        </small>
                                                    </div>
                                                </div>
                                                <div class="col-md-4">
                                                    <form th:action="@{/teacher/review}" method="post">
                                                        <input type="hidden" name="submissionId" th:value="${sub.submissionId}">
                                                        <div class="mb-2">
                                                            <input type="number" name="score" class="form-control form-control-sm"
                                                                   step="0.1" min="0" max="100" placeholder="评分(0-100)" required
                                                                   th:value="${stu.reviewMap != null and stu.reviewMap.get(sub.submissionId) != null ? stu.reviewMap.get(sub.submissionId).score : ''}">
                                                        </div>
                                                        <div class="mb-2">
                                                            <textarea name="comment" class="form-control form-control-sm"
                                                                      rows="2" placeholder="评语"
                                                                      th:text="${stu.reviewMap != null and stu.reviewMap.get(sub.submissionId) != null ? stu.reviewMap.get(sub.submissionId).comment : ''}"></textarea>
                                                        </div>
                                                        <button type="submit" class="btn btn-primary btn-sm w-100">
                                                            <i class="bi bi-check-lg me-1"></i>提交审阅
                                                        </button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div th:unless="${stu.submissions != null and !stu.submissions.isEmpty()}">
                                    <div class="text-center py-4 text-muted">
                                        <i class="bi bi-inbox display-4 d-block mb-2"></i>
                                        该学生尚未提交任何文件
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Helper to handle submission card selection (visual feedback)
        function loadSubmissions(btn) {
            // Reset all cards
            document.querySelectorAll('.submission-card').forEach(card => {
                card.classList.remove('selected');
            });
        }
    </script>
</body>
</html>
