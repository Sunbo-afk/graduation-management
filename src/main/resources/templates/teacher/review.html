<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审阅详情 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        
        .review-form-card { max-width: 700px; }
        .file-link { word-break: break-all; }
    </style>
</head>
<body>
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-primary me-3">教师</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
        </div>
    </nav>
    <div class="sidebar">
        <div class="nav-title">教师功能</div>
        <a href="/teacher/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/teacher/students" class="active"><i class="bi bi-people me-2"></i>指导学生</a>
        <a href="/teacher/topics"><i class="bi bi-journal-text me-2"></i>我的题目</a>
        <a href="/teacher/statistics"><i class="bi bi-bar-chart me-2"></i>统计分析</a>
    </div>
    <div class="main-content">
        <!-- Back Button -->
        <div class="mb-3">
            <a href="/teacher/students" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>返回学生列表
            </a>
        </div>

        <h3 class="mb-4"><i class="bi bi-card-checklist me-2 text-primary"></i>审阅详情</h3>

        <!-- No Submission -->
        <div th:unless="${submission != null}">
            <div class="text-center py-5">
                <i class="bi bi-file-earmark-x display-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">未找到提交记录</h5>
                <p class="text-muted">该提交可能已被删除或不存在</p>
                <a href="/teacher/students" class="btn btn-primary mt-2">
                    <i class="bi bi-arrow-left me-1"></i>返回学生列表
                </a>
            </div>
        </div>

        <!-- Submission Detail and Review Form -->
        <div th:if="${submission != null}">
            <div class="row">
                <!-- Submission Details -->
                <div class="col-lg-6 mb-4">
                    <div class="card h-100">
                        <div class="card-header bg-white">
                            <h5 class="card-title mb-0"><i class="bi bi-file-earmark-text me-2 text-primary"></i>提交详情</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-borderless">
                                <tbody>
                                    <tr>
                                        <td class="text-muted" style="width: 100px;">学生姓名</td>
                                        <td><strong th:text="${submission.selection?.student?.studentName}">学生姓名</strong></td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">学生学号</td>
                                        <td th:text="${submission.selection?.student?.studentNo}">学号</td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">题目</td>
                                        <td th:text="${submission.selection?.topic?.title}">题目</td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">提交阶段</td>
                                        <td><span class="badge bg-primary" th:text="${submission.stage}">阶段</span></td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">版本</td>
                                        <td th:text="${'v' + submission.version}">版本</td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">提交时间</td>
                                        <td th:text="${#temporals.format(submission.submitTime, 'yyyy-MM-dd HH:mm:ss')}">时间</td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">文件链接</td>
                                        <td class="file-link">
                                            <a th:if="${submission.filePath != null && (submission.filePath.startsWith('/files/') || submission.filePath.startsWith('files/'))}"
                                               th:href="${submission.filePath}" th:text="${submission.filePath}">文件路径</a>
                                            <a th:unless="${submission.filePath != null && (submission.filePath.startsWith('/files/') || submission.filePath.startsWith('files/'))}"
                                               th:href="${submission.filePath}" target="_blank" th:text="${submission.filePath}">文件路径</a>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">提交说明</td>
                                        <td th:text="${submission.description}">说明</td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">当前状态</td>
                                        <td>
                                            <span class="badge"
                                                  th:classappend="${submission.status == '已审阅' ? 'bg-success' : 'bg-warning text-dark'}"
                                                  th:text="${submission.status}">状态</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="card-footer bg-white">
                            <a th:href="${submission.filePath}"
                               th:target="${submission.filePath != null && (submission.filePath.startsWith('/files/') || submission.filePath.startsWith('files/')) ? '_self' : '_blank'}"
                               class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-download me-1"></i>下载/查看文件
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Review Form -->
                <div class="col-lg-6 mb-4">
                    <div class="card review-form-card h-100">
                        <div class="card-header bg-white">
                            <h5 class="card-title mb-0">
                                <i class="bi bi-pencil-square me-2 text-warning"></i>
                                <span th:if="${submission.status == '已审阅'}">修改评阅</span>
                                <span th:unless="${submission.status == '已审阅'}">提交评阅</span>
                            </h5>
                        </div>
                        <div class="card-body">
                            <!-- Existing Review Info -->
                            <div th:if="${existingReview != null}" class="alert alert-info mb-4">
                                <h6 class="alert-heading"><i class="bi bi-info-circle me-1"></i>已有评阅记录</h6>
                                <hr>
                                <p class="mb-1"><strong>评分：</strong><span th:text="${existingReview.score}">分数</span></p>
                                <p class="mb-1"><strong>评语：</strong><span th:text="${existingReview.comment}">评语</span></p>
                                <p class="mb-0"><strong>评阅时间：</strong><span th:text="${#temporals.format(existingReview.reviewTime, 'yyyy-MM-dd HH:mm')}">时间</span></p>
                            </div>

                            <form th:action="@{/teacher/review}" method="post">
                                <input type="hidden" name="submissionId" th:value="${submission.submissionId}">

                                <div class="mb-4">
                                    <label class="form-label">
                                        <i class="bi bi-star-fill text-warning me-1"></i>评分
                                        <small class="text-muted">（0-100分）</small>
                                    </label>
                                    <div class="input-group">
                                        <input type="number" name="score" class="form-control form-control-lg"
                                               step="0.1" min="0" max="100" placeholder="请输入评分"
                                               th:value="${existingReview?.score}" required>
                                        <span class="input-group-text">分</span>
                                    </div>
                                    <div class="form-text">优秀: 90-100 | 良好: 75-89 | 中等: 60-74 | 不及格: 60以下</div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">
                                        <i class="bi bi-chat-dots me-1"></i>评语
                                    </label>
                                    <textarea name="comment" class="form-control" rows="6"
                                              placeholder="请在此输入对本次提交的评语和建议..."
                                              th:text="${existingReview?.comment}"></textarea>
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="bi bi-check-lg me-1"></i>
                                        <span th:if="${submission.status == '已审阅'}">更新评阅</span>
                                        <span th:unless="${submission.status == '已审阅'}">提交评阅</span>
                                    </button>
                                    <a href="/teacher/students" class="btn btn-outline-secondary">
                                        <i class="bi bi-x-lg me-1"></i>取消
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
