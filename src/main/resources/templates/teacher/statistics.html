<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .rank-badge { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; }
        .rank-1 { background: #adb5bd; }
        .rank-2 { background: #ced4da; }
        .rank-3 { background: #dee2e6; }
        .rank-other { background: #e9ecef; color: #555; }
        .bar-container { background: #e9ecef; border-radius: 4px; height: 20px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    </style>
</head>
<body>
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-secondary me-3">教师</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
        </div>
    </nav>
    <div class="sidebar">
        <div class="nav-title">教师功能</div>
        <a href="/teacher/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/teacher/students"><i class="bi bi-people me-2"></i>指导学生</a>
        <a href="/teacher/topics"><i class="bi bi-journal-text me-2"></i>我的题目</a>
        <a href="/teacher/statistics" class="active"><i class="bi bi-bar-chart me-2"></i>统计分析</a>
    </div>
    <div class="main-content">
        <h3 class="mb-4"><i class="bi bi-bar-chart me-2 text-primary"></i>统计分析</h3>

        <!-- Summary Stats Row -->
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="card stat-summary-card bg-primary text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-people display-6 d-block mb-1"></i>
                        <div class="fs-4 fw-bold" th:text="${teacherStats?.studentCount}">0</div>
                        <small>我的学生数</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card stat-summary-card bg-success text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-check-circle display-6 d-block mb-1"></i>
                        <div class="fs-4 fw-bold" th:text="${teacherStats?.avgScore}">0</div>
                        <small>平均成绩</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card stat-summary-card bg-warning text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-trophy display-6 d-block mb-1"></i>
                        <div class="fs-4 fw-bold" th:text="${teacherStats?.maxScore}">0</div>
                        <small>最高成绩</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card stat-summary-card bg-info text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-hourglass-split display-6 d-block mb-1"></i>
                        <div class="fs-4 fw-bold" th:text="${teacherStats?.passRate != null ? teacherStats.passRate + '%' : '--'}">0%</div>
                        <small>通过率</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- My Student Score Ranking -->
            <div class="col-lg-6 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-white">
                        <h5 class="card-title mb-0"><i class="bi bi-trophy me-2 text-warning"></i>我的学生成绩排名</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${scoreRanking != null and !scoreRanking.isEmpty()}">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 50px;">排名</th>
                                        <th>姓名</th>
                                        <th>题目</th>
                                        <th>成绩</th>
                                        <th>进度</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="rank, iterStat : ${scoreRanking}">
                                        <td class="text-center">
                                            <span class="rank-badge"
                                                  th:classappend="${iterStat.count == 1 ? 'rank-1' : (iterStat.count == 2 ? 'rank-2' : (iterStat.count == 3 ? 'rank-3' : 'rank-other'))}"
                                                  th:text="${iterStat.count}">1</span>
                                        </td>
                                        <td th:text="${rank.stuName}">姓名</td>
                                        <td>
                                            <span th:text="${rank.topicTitle}" style="max-width: 140px; display: inline-block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">题目</span>
                                        </td>
                                        <td>
                                            <span class="fw-bold"
                                                  th:classappend="${rank.score >= 90 ? 'text-success' : (rank.score >= 75 ? 'text-warning' : (rank.score >= 60 ? 'text-dark' : 'text-danger'))}"
                                                  th:text="${rank.score}">分数</span>
                                        </td>
                                        <td>
                                            <span class="badge stage-badge"
                                                  th:classappend="${rank.currentStage == '终稿' ? 'bg-success' : (rank.currentStage == '初稿' ? 'bg-info' : (rank.currentStage == '中期检查' ? 'bg-warning text-dark' : (rank.currentStage == '开题报告' ? 'bg-primary' : 'bg-secondary')))}"
                                                  th:text="${rank.currentStage != null ? rank.currentStage : '未开始'}">阶段</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div th:unless="${scoreRanking != null and !scoreRanking.isEmpty()}">
                            <div class="text-center py-4 text-muted">
                                <i class="bi bi-bar-chart-steps display-4 d-block mb-2"></i>
                                暂无排名数据
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Department-Wide Score Comparison -->
            <div class="col-lg-6 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-white">
                        <h5 class="card-title mb-0"><i class="bi bi-building me-2 text-info"></i>院系统计对比</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${deptStats != null}">
                            <div class="mb-4">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-person-check me-1"></i>指导学生数对比
                                </label>
                                <div class="mb-2">
                                    <div class="d-flex justify-content-between mb-1">
                                        <small>我</small>
                                        <small th:text="${deptStats.myStudentCount} + '人'">0人</small>
                                    </div>
                                    <div class="bar-container">
                                        <div class="bar-fill bar-fill-blue"
                                             th:style="'width:' + (${deptStats.myStudentPercent} + '%')"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="d-flex justify-content-between mb-1">
                                        <small>院系平均</small>
                                        <small th:text="${deptStats.avgStudentCount} + '人'">0人</small>
                                    </div>
                                    <div class="bar-container">
                                        <div class="bar-fill bar-fill-green"
                                             th:style="'width:' + (100) + '%'"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-star me-1"></i>学生平均成绩对比
                                </label>
                                <div class="mb-2">
                                    <div class="d-flex justify-content-between mb-1">
                                        <small>我</small>
                                        <small th:text="${deptStats.myAvgScore} + '分'">0分</small>
                                    </div>
                                    <div class="bar-container">
                                        <div class="bar-fill bar-fill-orange"
                                             th:style="'width:' + (${deptStats.myScorePercent} + '%')"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="d-flex justify-content-between mb-1">
                                        <small>院系平均</small>
                                        <small th:text="${deptStats.deptAvgScore} + '分'">0分</small>
                                    </div>
                                    <div class="bar-container">
                                        <div class="bar-fill bar-fill-green"
                                             th:style="'width:' + (100) + '%'"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-check2-all me-1"></i>通过率对比
                                </label>
                                <div class="mb-2">
                                    <div class="d-flex justify-content-between mb-1">
                                        <small>我</small>
                                        <small th:text="${deptStats.myPassRate} + '%'">0%</small>
                                    </div>
                                    <div class="bar-container">
                                        <div class="bar-fill bar-fill-blue"
                                             th:style="'width:' + (${deptStats.myPassRate} + '%')"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="d-flex justify-content-between mb-1">
                                        <small>院系平均</small>
                                        <small th:text="${deptStats.deptPassRate} + '%'">0%</small>
                                    </div>
                                    <div class="bar-container">
                                        <div class="bar-fill bar-fill-green"
                                             th:style="'width:' + (100) + '%'"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div th:unless="${deptStats != null}">
                            <div class="text-center py-4 text-muted">
                                <i class="bi bi-building display-4 d-block mb-2"></i>
                                暂无院系统计数据
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Teacher-Student Count Distribution -->
        <div class="card mb-4">
            <div class="card-header bg-white">
                <h5 class="card-title mb-0"><i class="bi bi-diagram-3 me-2 text-success"></i>院系教师指导分布</h5>
            </div>
            <div class="card-body">
                <div th:if="${teacherDistribution != null and !teacherDistribution.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>教师姓名</th>
                                    <th>研究方向</th>
                                    <th>指导学生数</th>
                                    <th>分布比例</th>
                                    <th>平均成绩</th>
                                    <th>通过率</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="td : ${teacherDistribution}">
                                    <td>
                                        <strong th:classappend="${td.isMe ? 'text-primary' : ''}"
                                                th:text="${td.teacherName}">姓名</strong>
                                        <span th:if="${td.isMe}" class="badge bg-primary ms-1">我</span>
                                    </td>
                                    <td><span class="badge bg-secondary" th:text="${td.researchDirection}">方向</span></td>
                                    <td th:text="${td.studentCount}">0</td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="bar-container flex-grow-1 me-2" style="height: 12px;">
                                                <div class="bar-fill"
                                                     th:classappend="${td.isMe ? 'bar-fill-orange' : 'bar-fill-blue'}"
                                                     th:style="'width:' + (${td.distributionPercent} + '%')"></div>
                                            </div>
                                            <small th:text="${td.distributionPercent != null ? td.distributionPercent + '%' : '0%'}">0%</small>
                                        </div>
                                    </td>
                                    <td th:text="${td.avgScore}">0</td>
                                    <td th:text="${td.passRate} + '%'">0%</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:unless="${teacherDistribution != null and !teacherDistribution.isEmpty()}">
                    <div class="text-center py-4 text-muted">
                        <i class="bi bi-diagram-3 display-4 d-block mb-2"></i>
                        暂无分布数据
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
