<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览题目 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-secondary me-3">学生</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
        </div>
    </nav>
    <div class="sidebar">
        <div class="nav-title">学生功能</div>
        <a href="/student/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/student/topics" class="active"><i class="bi bi-journal-text me-2"></i>浏览题目</a>
        <a href="/student/my-selection"><i class="bi bi-check-circle me-2"></i>我的选题</a>
        <a href="/student/reviews"><i class="bi bi-star me-2"></i>查看成绩</a>
    </div>
    <div class="main-content">
        <h3 class="mb-4"><i class="bi bi-journal-text me-2 text-success"></i>浏览题目</h3>

        <!-- Already Selected Warning -->
        <div th:if="${hasSelection}" class="alert alert-info mb-4">
            <i class="bi bi-info-circle me-2"></i>
            您已经选择了毕业设计题目。如需更改，请联系管理员。
        </div>

        <!-- Search Form -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/student/topics}" method="get" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="keyword"><i class="bi bi-search me-1"></i>关键词搜索</label>
                        <input type="text" name="keyword" id="keyword" class="form-control"
                               th:value="${param.keyword}" placeholder="输入题目关键词搜索...">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="direction"><i class="bi bi-funnel me-1"></i>研究方向</label>
                        <select name="direction" id="direction" class="form-select">
                            <option value="">全部方向</option>
                            <option th:each="dir : ${directions}"
                                    th:value="${dir}"
                                    th:text="${dir}"
                                    th:selected="${param.direction != null and param.direction[0] == dir}">方向</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-search me-1"></i>搜索
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Topics List -->
        <div th:if="${topics != null and !topics.isEmpty()}">
            <div class="row">
                <div class="col-md-6 mb-3" th:each="topic : ${topics}">
                    <div class="card topic-card h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0" th:text="${topic.title}">题目名称</h5>
                                <span class="badge"
                                      th:classappend="${topic.status == 0 ? 'bg-success' : 'bg-secondary'}"
                                      th:text="${topic.status == 0 ? '可选' : '已选'}">状态</span>
                            </div>
                            <div class="mb-2">
                                <span class="direction-badge badge bg-light text-dark me-1"
                                      th:text="${topic.direction}">方向</span>
                                <span class="text-muted small">
                                    <i class="bi bi-people me-1"></i>最多可选
                                    <span th:text="${topic.maxSelect}">1</span>
                                    人
                                </span>
                            </div>
                            <p class="card-text text-muted small" th:text="${topic.description}">题目描述</p>
                            <hr>
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center">
                                    <div class="teacher-avatar me-2">
                                        <span th:text="${topic.teacherName != null ? #strings.substring(topic.teacherName, 0, 1) : '教'}">教</span>
                                    </div>
                                    <div>
                                        <small class="text-muted d-block">指导教师</small>
                                        <span class="fw-bold" th:text="${topic.teacherName}">教师姓名</span>
                                    </div>
                                </div>
                                <form th:action="@{/student/select}" method="post" th:if="${!hasSelection and topic.status == 0}">
                                    <input type="hidden" name="topicId" th:value="${topic.topicId}">
                                    <button type="submit" class="btn btn-outline-success btn-sm"
                                            th:disabled="${topic.status != 0}">
                                        <i class="bi bi-hand-index me-1"></i>选择
                                    </button>
                                </form>
                                <button class="btn btn-outline-secondary btn-sm" disabled
                                        th:if="${hasSelection or topic.status != 0}">
                                    <i class="bi bi-lock me-1"></i>不可选
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:unless="${topics != null and !topics.isEmpty()}">
            <div class="text-center py-5">
                <i class="bi bi-inbox display-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">暂无符合条件的题目</h5>
                <p class="text-muted">请尝试调整搜索条件或联系指导教师添加题目</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
