<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的选题 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-secondary me-3">学生</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
        </div>
    </nav>
    <div class="sidebar">
        <div class="nav-title">学生功能</div>
        <a href="/student/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/student/topics"><i class="bi bi-journal-text me-2"></i>浏览题目</a>
        <a href="/student/my-selection" class="active"><i class="bi bi-check-circle me-2"></i>我的选题</a>
        <a href="/student/reviews"><i class="bi bi-star me-2"></i>查看成绩</a>
    </div>
    <div class="main-content">
        <h3 class="mb-4"><i class="bi bi-check-circle me-2 text-success"></i>我的选题</h3>

        <!-- Alert messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- No Selection State -->
        <div th:unless="${selection != null}">
            <div class="text-center py-5">
                <i class="bi bi-clipboard-x display-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">您还未进行选题</h5>
                <p class="text-muted">请前往浏览题目页面选择毕业设计题目</p>
                <a href="/student/topics" class="btn btn-success mt-2"><i class="bi bi-search me-1"></i>浏览题目</a>
            </div>
        </div>

        <!-- Has Selection -->
        <div th:if="${selection != null}">
            <!-- Topic Detail Card -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0"><i class="bi bi-info-circle me-2 text-success"></i>选题详情</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-8">
                            <table class="table table-borderless">
                                <tbody>
                                    <tr>
                                        <td class="text-muted" style="width: 120px;">题目名称</td>
                                        <td><strong th:text="${topic?.title}">题目名称</strong></td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">研究方向</td>
                                        <td><span class="badge bg-info" th:text="${topic?.direction}">方向</span></td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">指导教师</td>
                                        <td th:text="${selection.teacherName}">教师姓名</td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">题目描述</td>
                                        <td th:text="${topic?.description}">描述</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="col-md-4 border-start">
                            <table class="table table-borderless">
                                <tbody>
                                    <tr>
                                        <td class="text-muted">选题时间</td>
                                        <td th:text="${#temporals.format(selection.selectTime, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">当前状态</td>
                                        <td>
                                            <span class="badge"
                                                  th:classappend="${selection.status == '已通过' ? 'bg-success' : (selection.status == '待审核' ? 'bg-warning text-dark' : (selection.status == '已拒绝' ? 'bg-danger' : 'bg-secondary'))}"
                                                  th:text="${selection.status}">状态</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submit new document -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="card-title mb-0"><i class="bi bi-upload me-2"></i>提交新文档</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/student/submit}" method="post">
                        <input type="hidden" name="selectionId" th:value="${selection?.selectionId}">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">提交阶段 <span class="text-danger">*</span></label>
                                <select name="stage" class="form-select" required>
                                    <option value="">请选择阶段</option>
                                    <option value="开题报告">开题报告</option>
                                    <option value="中期检查">中期检查</option>
                                    <option value="初稿">初稿</option>
                                    <option value="终稿">终稿</option>
                                </select>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label">文件路径/链接 <span class="text-danger">*</span></label>
                                <input type="text" name="filePath" class="form-control" placeholder="文件路径或网盘链接" required>
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <button type="submit" class="btn btn-dark w-100">提交文档</button>
                            </div>
                            <div class="col-12">
                                <label class="form-label">提交说明</label>
                                <textarea name="description" class="form-control" rows="2" placeholder="可选：对本次提交的补充说明"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Submission History -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="card-title mb-0"><i class="bi bi-clock-history me-2"></i>提交记录</h5>
                </div>
                <div class="card-body">

                    <!-- Submissions Table -->
                    <div th:if="${submissions != null and !submissions.isEmpty()}">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>阶段</th>
                                    <th>版本</th>
                                    <th>提交时间</th>
                                    <th>文件路径</th>
                                    <th>提交说明</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="submission-row" th:each="sub : ${submissions}">
                                    <td><span class="badge bg-secondary" th:text="${sub.stage}">阶段</span></td>
                                    <td th:text="${'v' + sub.version}">v1</td>
                                    <td th:text="${#temporals.format(sub.submitTime, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                                    <td>
                                        <a th:href="${sub.filePath}" target="_blank" class="text-truncate d-inline-block" style="max-width: 200px;"
                                           th:text="${sub.filePath}">文件路径</a>
                                    </td>
                                    <td th:text="${sub.description}">说明</td>
                                    <td>
                                        <span class="badge review-badge"
                                              th:classappend="${sub.status == '已审阅' ? 'bg-success' : (sub.status == '待审阅' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                              th:text="${sub.status}">状态</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:unless="${submissions != null and !submissions.isEmpty()}">
                        <div class="text-center text-muted py-3">
                            <i class="bi bi-file-earmark-text display-4 d-block mb-2"></i>
                            暂无提交记录
                        </div>
                    </div>
                </div>
            </div>

            <!-- Review History -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0"><i class="bi bi-star me-2 text-warning"></i>评阅记录</h5>
                </div>
                <div class="card-body">
                    <div th:if="${reviews != null and !reviews.isEmpty()}">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>阶段</th>
                                    <th>版本</th>
                                    <th>提交时间</th>
                                    <th>评分</th>
                                    <th>评语</th>
                                    <th>评阅时间</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="review : ${reviews}">
                                    <td><span class="badge bg-secondary" th:text="${review.stage}">阶段</span></td>
                                    <td th:text="${'v' + review.submissionVersion}">v1</td>
                                    <td th:text="${#temporals.format(review.submitTime, 'yyyy-MM-dd HH:mm')}">提交时间</td>
                                    <td>
                                        <span class="fw-bold"
                                              th:classappend="${review.score >= 90 ? 'text-success' : (review.score >= 60 ? 'text-warning' : 'text-danger')}"
                                              th:text="${review.score}">分数</span>
                                    </td>
                                    <td th:text="${review.comment}">评语</td>
                                    <td th:text="${#temporals.format(review.reviewTime, 'yyyy-MM-dd HH:mm')}">评阅时间</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:unless="${reviews != null and !reviews.isEmpty()}">
                        <div class="text-center text-muted py-3">
                            <i class="bi bi-star-half display-4 d-block mb-2"></i>
                            暂无评阅记录，请等待指导教师审阅
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
