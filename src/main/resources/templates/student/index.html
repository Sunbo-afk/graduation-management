<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生首页 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-secondary me-3">学生</span>
            <a href="/logout" class="btn btn-outline-secondary btn-sm">退出</a>
        </div>
    </nav>
    <div class="sidebar">
        <div class="nav-title">学生功能</div>
        <a href="/student/index" class="active"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/student/topics"><i class="bi bi-journal-text me-2"></i>浏览题目</a>
        <a href="/student/my-selection"><i class="bi bi-check-circle me-2"></i>我的选题</a>
        <a href="/student/reviews"><i class="bi bi-star me-2"></i>查看成绩</a>
    </div>

    <div class="main-content">
        <h3 class="mb-1">欢迎回来，<span th:text="${student?.stuName}">同学</span></h3>
        <p class="text-muted">学号：<span th:text="${student?.stuId}"></span></p>
        <hr>

        <div class="card mb-4">
            <div class="card-header">选题状态</div>
            <div class="card-body">
                <div th:if="${selection != null}">
                    <p><strong>已选题目：</strong><span th:text="${selectedTopic?.title}">--</span></p>
                    <p><strong>指导教师：</strong><span th:text="${selection.teacherName}">--</span></p>
                    <p><strong>选题时间：</strong><span th:text="${#temporals.format(selection.selectTime, 'yyyy-MM-dd HH:mm')}">--</span></p>
                    <p><strong>当前状态：</strong><span th:text="${selection.status}" class="badge bg-secondary"></span></p>
                    <p><strong>综合成绩：</strong>
                        <span th:if="${selection.finalScore != null}" th:text="${selection.finalScore} + ' 分'" class="fw-bold"></span>
                        <span th:unless="${selection.finalScore != null}" class="text-muted">尚未评定</span>
                    </p>
                </div>
                <div th:unless="${selection != null}">
                    <div class="alert alert-secondary">您还未选题，请尽快选择毕业设计题目。</div>
                    <a href="/student/topics" class="btn btn-dark">去选题</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">各阶段时间节点</div>
            <div class="card-body">
                <table class="table" th:if="${deadlines != null and !deadlines.isEmpty()}">
                    <thead><tr><th>阶段</th><th>开始日期</th><th>截止日期</th><th>说明</th></tr></thead>
                    <tbody>
                        <tr th:each="dl : ${deadlines}">
                            <td th:text="${dl.stage}"></td>
                            <td th:text="${#temporals.format(dl.startDate, 'yyyy-MM-dd')}"></td>
                            <td th:text="${#temporals.format(dl.endDate, 'yyyy-MM-dd')}"></td>
                            <td th:text="${dl.description}"></td>
                        </tr>
                    </tbody>
                </table>
                <p th:unless="${deadlines != null and !deadlines.isEmpty()}" class="text-muted">暂无</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
