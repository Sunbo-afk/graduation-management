<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查看成绩 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-secondary me-3">学生</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
        </div>
    </nav>
    <div class="sidebar">
        <div class="nav-title">学生功能</div>
        <a href="/student/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/student/topics"><i class="bi bi-journal-text me-2"></i>浏览题目</a>
        <a href="/student/my-selection"><i class="bi bi-check-circle me-2"></i>我的选题</a>
        <a href="/student/reviews" class="active"><i class="bi bi-star me-2"></i>查看成绩</a>
    </div>
    <div class="main-content">
        <h3 class="mb-4"><i class="bi bi-star me-2 text-warning"></i>查看成绩</h3>

        <!-- No Selection State -->
        <div th:unless="${selection != null}">
            <div class="text-center py-5">
                <i class="bi bi-clipboard-x display-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">您还未进行选题</h5>
                <p class="text-muted">请先完成选题后再查看成绩</p>
                <a href="/student/topics" class="btn btn-success mt-2"><i class="bi bi-search me-1"></i>浏览题目</a>
            </div>
        </div>

        <!-- Has Selection -->
        <div th:if="${selection != null}">
            <!-- Topic Info Summary -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h5 th:text="${topic?.title}">题目名称</h5>
                            <p class="mb-1 text-muted">
                                <i class="bi bi-person me-1"></i>指导教师：<span th:text="${selection.teacherName}">教师姓名</span>
                            </p>
                            <p class="mb-0">
                                <span class="badge bg-info me-1" th:text="${topic?.direction}">方向</span>
                                <span class="badge"
                                      th:classappend="${selection.status == '已通过' ? 'bg-success' : (selection.status == '待审核' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                      th:text="${selection.status}">状态</span>
                            </p>
                        </div>
                        <div class="col-md-4 text-center">
                            <!-- Overall Score (if applicable) -->
                            <div th:if="${overallScore != null}">
                                <div class="score-circle"
                                     th:classappend="${overallScore >= 90 ? 'score-excellent' : (overallScore >= 75 ? 'score-good' : (overallScore >= 60 ? 'score-warning' : 'score-fail'))}">
                                    <span th:text="${overallScore}">分数</span>
                                </div>
                                <small class="text-muted d-block mt-2">综合成绩</small>
                            </div>
                            <div th:unless="${overallScore != null}">
                                <div class="score-circle bg-light text-muted">
                                    <span>--</span>
                                </div>
                                <small class="text-muted d-block mt-2">综合成绩（暂无）</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submissions with Reviews Table -->
            <div class="card">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0"><i class="bi bi-list-check me-2 text-success"></i>提交与评阅详情</h5>
                </div>
                <div class="card-body">
                    <div th:if="${submissionReviews != null and !submissionReviews.isEmpty()}">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>阶段</th>
                                        <th>版本</th>
                                        <th>提交时间</th>
                                        <th>提交状态</th>
                                        <th>评阅状态</th>
                                        <th>评分</th>
                                        <th>评语</th>
                                        <th>评阅时间</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="sr : ${submissionReviews}">
                                        <td><span class="badge bg-secondary" th:text="${sr.stage}">阶段</span></td>
                                        <td th:text="${'v' + sr.version}">v1</td>
                                        <td>
                                            <span th:if="${sr.submitTime != null}"
                                                  th:text="${#temporals.format(sr.submitTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                                            <span th:unless="${sr.submitTime != null}" class="text-muted">--</span>
                                        </td>
                                        <td>
                                            <span class="badge"
                                                  th:classappend="${sr.submissionStatus == '已审阅' ? 'bg-success' : (sr.submissionStatus == '待审阅' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                                  th:text="${sr.submissionStatus}">状态</span>
                                        </td>
                                        <td>
                                            <span th:if="${sr.reviewStatus != null}" class="badge"
                                                  th:classappend="${sr.reviewStatus == '已完成' ? 'bg-success' : 'bg-warning text-dark'}"
                                                  th:text="${sr.reviewStatus}">评阅状态</span>
                                            <span th:unless="${sr.reviewStatus != null}" class="badge bg-light text-muted">未评阅</span>
                                        </td>
                                        <td>
                                            <span th:if="${sr.score != null}" class="fw-bold"
                                                  th:classappend="${sr.score >= 90 ? 'text-success' : (sr.score >= 75 ? 'text-warning' : (sr.score >= 60 ? 'text-dark' : 'text-danger'))}"
                                                  th:text="${sr.score}">分数</span>
                                            <span th:unless="${sr.score != null}" class="text-muted">--</span>
                                        </td>
                                        <td>
                                            <span th:if="${sr.comment != null}" th:text="${sr.comment}" style="max-width: 200px; display: inline-block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">评语</span>
                                            <span th:unless="${sr.comment != null}" class="text-muted">--</span>
                                        </td>
                                        <td>
                                            <span th:if="${sr.reviewTime != null}"
                                                  th:text="${#temporals.format(sr.reviewTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                                            <span th:unless="${sr.reviewTime != null}" class="text-muted">--</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div th:unless="${submissionReviews != null and !submissionReviews.isEmpty()}">
                        <div class="text-center py-5">
                            <i class="bi bi-inbox display-1 text-muted d-block mb-3"></i>
                            <h5 class="text-muted">暂无提交和评阅记录</h5>
                            <p class="text-muted">请先在"我的选题"页面提交各阶段的文档</p>
                            <a href="/student/my-selection" class="btn btn-success mt-2"><i class="bi bi-upload me-1"></i>去提交</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Score Summary Per Stage -->
            <div class="card mt-4" th:if="${stageScores != null and !stageScores.isEmpty()}">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0"><i class="bi bi-bar-chart me-2 text-success"></i>各阶段评分汇总</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>阶段</th>
                                    <th>最高分</th>
                                    <th>评分</th>
                                    <th>评语</th>
                                    <th>评阅时间</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="ss : ${stageScores}">
                                    <td><span class="badge bg-primary" th:text="${ss.stage}">阶段</span></td>
                                    <td th:text="${ss.maxScore} + '分'">分数</td>
                                    <td>
                                        <span class="fw-bold"
                                              th:classappend="${ss.score >= 90 ? 'text-success' : (ss.score >= 75 ? 'text-warning' : (ss.score >= 60 ? 'text-dark' : 'text-danger'))}"
                                              th:text="${ss.score}">分数</span>
                                    </td>
                                    <td th:text="${ss.comment}">评语</td>
                                    <td th:text="${#temporals.format(ss.reviewTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
