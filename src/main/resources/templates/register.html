<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: #f1f3f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px 0; }
        .register-card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 24px 36px; width: 100%; max-width: 520px; }
        .register-card h2 { font-weight: 600; margin-bottom: 5px; }
        .register-card .subtitle { color: #868e96; margin-bottom: 15px; }
        .role-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .role-option { flex: 1; text-align: center; padding: 10px; border: 2px solid #dee2e6; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .role-option.selected { border-color: #495057; background: #f1f3f5; }
        .role-option i { font-size: 24px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2 class="text-center">毕业设计管理系统</h2>
        <p class="subtitle text-center">用户注册</p>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/register}" method="post">
            <label class="form-label fw-bold">选择身份</label>
            <div class="role-selector">
                <div class="role-option selected" data-role="STUDENT" onclick="switchRole('STUDENT')">
                    <i class="bi bi-mortarboard"></i>学生
                </div>
                <div class="role-option" data-role="TEACHER" onclick="switchRole('TEACHER')">
                    <i class="bi bi-person-workspace"></i>教师
                </div>
            </div>
            <input type="hidden" name="role" id="roleInput" value="STUDENT">

            <div class="mb-3">
                <label class="form-label">账号 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="userId" placeholder="请输入学号或工号" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">姓名 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="userName" placeholder="请输入真实姓名" required>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" name="password" placeholder="至少6位" required minlength="6">
                </div>
                <div class="col-md-6">
                    <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" name="confirmPassword" placeholder="再次输入" required minlength="6">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">手机</label>
                    <input type="text" class="form-control" name="phone" placeholder="选填">
                </div>
                <div class="col-md-6">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-control" name="email" placeholder="选填">
                </div>
            </div>

            <!-- Student fields -->
            <div id="studentFields">
                <div class="mb-3">
                    <label class="form-label">所属院系 <span class="text-danger">*</span></label>
                    <select class="form-select" id="deptSelect" required>
                        <option value="">请选择院系</option>
                        <option th:each="d : ${departments}" th:value="${d.deptId}" th:text="${d.deptName}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">所属专业 <span class="text-danger">*</span></label>
                    <select class="form-select" id="majorSelect" required disabled>
                        <option value="">请先选择院系</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">班级 <span class="text-danger">*</span></label>
                    <select class="form-select" name="classId" id="classSelect" required disabled>
                        <option value="">请先选择专业</option>
                    </select>
                </div>
            </div>

            <!-- Teacher fields (hidden by default) -->
            <div id="teacherFields" style="display:none;">
                <div class="mb-3">
                    <label class="form-label">所属院系 <span class="text-danger">*</span></label>
                    <select class="form-select" name="deptId" id="teacherDept" disabled>
                        <option value="">请选择院系</option>
                        <option th:each="d : ${departments}" th:value="${d.deptId}" th:text="${d.deptName}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">职称</label>
                    <select class="form-select" name="title">
                        <option value="教授">教授</option><option value="副教授">副教授</option>
                        <option value="讲师" selected>讲师</option><option value="助教">助教</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">研究方向</label>
                    <input type="text" class="form-control" name="researchDirection" placeholder="如：Web开发、人工智能">
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100 mt-2">注 册</button>
        </form>

        <p class="text-center mt-3">已有账号？<a href="/login">返回登录</a></p>
    </div>

    <script th:inline="javascript">
        var allMajors = /*[[${majors}]]*/ [];
        var allClasses = /*[[${classes}]]*/ [];
    </script>
    <script>
        var majorsByDept = {}, classesByMajor = {};
        allMajors.forEach(function(m) { (majorsByDept[m.deptId]=majorsByDept[m.deptId]||[]).push(m); });
        allClasses.forEach(function(c) { (classesByMajor[c.majorId]=classesByMajor[c.majorId]||[]).push(c); });

        document.getElementById('deptSelect').addEventListener('change', function() {
            var deptId = parseInt(this.value);
            var majorSelect = document.getElementById('majorSelect');
            var classSelect = document.getElementById('classSelect');
            majorSelect.innerHTML = '<option value="">请选择专业</option>';
            classSelect.innerHTML = '<option value="">请先选择专业</option>';
            classSelect.disabled = true;
            if (deptId && majorsByDept[deptId]) {
                majorsByDept[deptId].forEach(function(m) {
                    var opt = document.createElement('option');
                    opt.value = m.majorId; opt.textContent = m.majorName;
                    majorSelect.appendChild(opt);
                });
                majorSelect.disabled = false;
            } else { majorSelect.disabled = true; }
        });

        document.getElementById('majorSelect').addEventListener('change', function() {
            var majorId = parseInt(this.value);
            var classSelect = document.getElementById('classSelect');
            classSelect.innerHTML = '<option value="">请选择班级</option>';
            if (majorId && classesByMajor[majorId]) {
                classesByMajor[majorId].forEach(function(c) {
                    var opt = document.createElement('option');
                    opt.value = c.classId; opt.textContent = c.className + '（' + c.grade + '级）';
                    classSelect.appendChild(opt);
                });
                classSelect.disabled = false;
            } else { classSelect.disabled = true; }
        });

        function switchRole(role) {
            document.querySelectorAll('.role-option').forEach(function(o) {
                o.classList.remove('selected');
                if (o.dataset.role === role) o.classList.add('selected');
            });
            document.getElementById('roleInput').value = role;
            var isStudent = role === 'STUDENT';
            document.getElementById('studentFields').style.display = isStudent ? '' : 'none';
            document.getElementById('teacherFields').style.display = isStudent ? 'none' : '';
            document.querySelectorAll('#studentFields select').forEach(function(s) { s.required = isStudent; s.disabled = !isStudent; });
            document.querySelectorAll('#teacherFields select').forEach(function(s) { s.required = !isStudent; s.disabled = isStudent; });
        }

        document.querySelectorAll('.role-option').forEach(function(option) {
            option.addEventListener('click', function() { switchRole(this.dataset.role); });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
