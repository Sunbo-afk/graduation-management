<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-secondary me-3" th:text="${session.loginUser?.role}"></span>
            <a href="/logout" class="btn btn-outline-secondary btn-sm">退出</a>
        </div>
    </nav>

    <div class="sidebar">
        <div class="nav-title">管理功能</div>
        <a href="/admin/index" class="active"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/admin/departments"><i class="bi bi-building me-2"></i>系管理</a>
        <a href="/admin/majors"><i class="bi bi-book me-2"></i>专业管理</a>
        <a href="/admin/classes"><i class="bi bi-people me-2"></i>班级管理</a>
        <a href="/admin/users"><i class="bi bi-person-badge me-2"></i>用户管理</a>
        <a href="/admin/deadlines"><i class="bi bi-calendar-check me-2"></i>期限管理</a>
        <div class="nav-title">统计与维护</div>
        <a href="/admin/statistics"><i class="bi bi-bar-chart me-2"></i>统计分析</a>
        <a href="/admin/backup"><i class="bi bi-archive me-2"></i>数据库备份</a>
    </div>

    <div class="main-content">
        <h4 class="mb-4"><i class="bi bi-speedometer2 me-2"></i>系统概览</h4>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <div class="text-muted small">学生总数</div>
                    <div class="fs-3 fw-bold" th:text="${stats.studentCount}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <div class="text-muted small">教师总数</div>
                    <div class="fs-3 fw-bold" th:text="${stats.teacherCount}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <div class="text-muted small">题目总数</div>
                    <div class="fs-3 fw-bold" th:text="${stats.topicCount}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <div class="text-muted small">完成率</div>
                    <div class="fs-3 fw-bold"><span th:text="${stats.completionRate}">0</span>%</div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header"><i class="bi bi-info-circle me-2"></i>系统信息</div>
                    <div class="card-body">
                        <table class="table table-borderless mb-0">
                            <tr><td class="text-muted" style="width:40%">系统版本</td><td>毕业设计管理系统 v1.0</td></tr>
                            <tr><td class="text-muted">当前学期</td><td>2025-2026-2</td></tr>
                            <tr><td class="text-muted">当前时间</td><td id="currentTime"></td></tr>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header"><i class="bi bi-lightbulb me-2"></i>快捷操作</div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <a href="/admin/users" class="btn btn-outline-secondary"><i class="bi bi-person-plus me-2"></i>管理用户</a>
                            <a href="/admin/deadlines" class="btn btn-outline-secondary"><i class="bi bi-calendar-check me-2"></i>设置期限</a>
                            <a href="/admin/statistics" class="btn btn-outline-secondary"><i class="bi bi-bar-chart me-2"></i>统计报告</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var now = new Date();
        document.getElementById('currentTime').textContent =
            now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0')
            + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    </script>
</body>
</html>
