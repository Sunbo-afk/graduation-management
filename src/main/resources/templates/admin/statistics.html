<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        
        .section-card { margin-bottom: 24px; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-secondary me-3" th:text="${session.loginUser?.role}"></span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="nav-title">管理功能</div>
        <a href="/admin/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/admin/departments"><i class="bi bi-building me-2"></i>系管理</a>
        <a href="/admin/majors"><i class="bi bi-book me-2"></i>专业管理</a>
        <a href="/admin/classes"><i class="bi bi-people me-2"></i>班级管理</a>
        <a href="/admin/users"><i class="bi bi-person-badge me-2"></i>用户管理</a>
        <a href="/admin/deadlines"><i class="bi bi-calendar-check me-2"></i>期限管理</a>
        <div class="nav-title">统计与维护</div>
        <a href="/admin/statistics" class="active"><i class="bi bi-bar-chart me-2"></i>统计分析</a>
        <a href="/admin/backup"><i class="bi bi-archive me-2"></i>数据库备份</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h4 class="mb-4"><i class="bi bi-bar-chart me-2"></i>统计分析</h4>

        <!-- Score Rankings Section -->
        <div class="card shadow-sm border-0 section-card">
            <div class="card-header bg-white border-0">
                <h5 class="mb-0"><i class="bi bi-trophy me-2"></i>成绩排名</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 130px;">学号</th>
                            <th style="width: 100px;">姓名</th>
                            <th>系</th>
                            <th>专业</th>
                            <th>题目</th>
                            <th style="width: 110px;">最终成绩</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${scoreRankings}">
                            <td th:text="${item.stuId}">20210101001</td>
                            <td th:text="${item.stuName}">张三</td>
                            <td th:text="${item.deptName}">计算机科学与技术系</td>
                            <td th:text="${item.majorName}">计算机科学与技术</td>
                            <td th:text="${item.topicTitle}">基于Spring Boot的毕业设计管理系统</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${item.finalScore >= 90 ? 'bg-success' :
                                                        item.finalScore >= 80 ? 'bg-primary' :
                                                        item.finalScore >= 70 ? 'bg-secondary text-dark' :
                                                        item.finalScore >= 60 ? 'bg-warning text-dark' :
                                                        'bg-danger'}"
                                      th:text="${item.finalScore}">85</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(scoreRankings)}">
                            <td colspan="6" class="text-center text-muted py-4">暂无成绩数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Teacher Statistics Section -->
        <div class="card shadow-sm border-0 section-card">
            <div class="card-header bg-white border-0">
                <h5 class="mb-0"><i class="bi bi-person-lines-fill me-2"></i>教师指导学生统计</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>教师</th>
                            <th style="width: 150px;">已指导学生数</th>
                            <th style="width: 150px;">最大容量</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ts : ${teacherStats}">
                            <td th:text="${ts.teacherName}">李教授</td>
                            <td th:text="${ts.studentCount}">5</td>
                            <td th:text="${ts.maxStudents}">8</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(teacherStats)}">
                            <td colspan="3" class="text-center text-muted py-4">暂无统计数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Department Completion Statistics Section -->
        <div class="card shadow-sm border-0 section-card">
            <div class="card-header bg-white border-0">
                <h5 class="mb-0"><i class="bi bi-building me-2"></i>各系完成情况统计</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>系</th>
                            <th style="width: 150px;">学生总数</th>
                            <th style="width: 150px;">已完成数</th>
                            <th style="width: 150px;">完成率</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ds : ${deptStats}">
                            <td th:text="${ds.deptName}">计算机科学与技术系</td>
                            <td th:text="${ds.totalStudents}">120</td>
                            <td th:text="${ds.completedStudents}">98</td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="progress flex-grow-1 me-2" style="height: 8px;">
                                        <div class="progress-bar"
                                             th:classappend="${ds.completionRate >= 80 ? 'bg-success' :
                                                               ds.completionRate >= 60 ? 'bg-secondary' :
                                                               ds.completionRate >= 40 ? 'bg-warning' :
                                                               'bg-danger'}"
                                             th:style="'width:' + ${ds.completionRate} + '%'"
                                             style="width: 80%;">
                                        </div>
                                    </div>
                                    <span th:text="${ds.completionRate} + '%'" style="font-size: 0.9rem;">80%</span>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(deptStats)}">
                            <td colspan="4" class="text-center text-muted py-4">暂无统计数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
