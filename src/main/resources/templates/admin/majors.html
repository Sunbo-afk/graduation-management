<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业管理 - 毕业设计管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-light px-4">
        <span class="navbar-brand mb-0 h4">毕业设计管理系统</span>
        <div class="d-flex align-items-center">
            <span th:text="${session.loginUser?.userName}" class="me-3"></span>
            <span class="badge bg-secondary me-3" th:text="${session.loginUser?.role}"></span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="nav-title">管理功能</div>
        <a href="/admin/index"><i class="bi bi-speedometer2 me-2"></i>首页</a>
        <a href="/admin/departments"><i class="bi bi-building me-2"></i>系管理</a>
        <a href="/admin/majors" class="active"><i class="bi bi-book me-2"></i>专业管理</a>
        <a href="/admin/classes"><i class="bi bi-people me-2"></i>班级管理</a>
        <a href="/admin/users"><i class="bi bi-person-badge me-2"></i>用户管理</a>
        <a href="/admin/deadlines"><i class="bi bi-calendar-check me-2"></i>期限管理</a>
        <div class="nav-title">统计与维护</div>
        <a href="/admin/statistics"><i class="bi bi-bar-chart me-2"></i>统计分析</a>
        <a href="/admin/backup"><i class="bi bi-archive me-2"></i>数据库备份</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0"><i class="bi bi-book me-2"></i>专业管理</h4>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#majorModal" onclick="resetModal()">
                <i class="bi bi-plus-lg me-1"></i>添加专业
            </button>
        </div>

        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Majors Table -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 80px;">ID</th>
                            <th>专业名称</th>
                            <th>所属系</th>
                            <th style="width: 180px;">创建时间</th>
                            <th style="width: 160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="major : ${majors}">
                            <td th:text="${major.majorId}">1</td>
                            <td th:text="${major.majorName}">计算机科学与技术</td>
                            <td th:text="${deptMap[major.deptId]}">计算机科学与技术系</td>
                            <td th:text="${#temporals.format(major.createdAt, 'yyyy-MM-dd HH:mm')}">2025-01-01 08:00</td>
                            <td>
                                <button class="btn btn-sm btn-outline-secondary me-1"
                                        th:attr="data-id=${major.majorId},data-name=${major.majorName},data-dept=${major.deptId}"
                                        data-bs-toggle="modal" data-bs-target="#majorModal"
                                        onclick="editMajor(this)">
                                    <i class="bi bi-pencil-square"></i> 编辑
                                </button>
                                <a class="btn btn-sm btn-outline-danger"
                                   th:href="@{/admin/major/delete/{id}(id=${major.majorId})}"
                                   onclick="return confirm('确定要删除该专业吗？此操作不可恢复。')">
                                    <i class="bi bi-trash"></i> 删除
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(majors)}">
                            <td colspan="5" class="text-center text-muted py-4">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Major Modal -->
    <div class="modal fade" id="majorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/major/save}" method="post" id="majorForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="majorModalTitle">添加专业</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="majorId" name="majorId">
                        <div class="mb-3">
                            <label for="majorName" class="form-label">专业名称</label>
                            <input type="text" class="form-control" id="majorName" name="majorName" required
                                   placeholder="请输入专业名称">
                        </div>
                        <div class="mb-3">
                            <label for="majorDeptId" class="form-label">所属系</label>
                            <select class="form-select" id="majorDeptId" name="deptId" required>
                                <option value="">请选择所属系</option>
                                <option th:each="d : ${departments}"
                                        th:value="${d.deptId}"
                                        th:text="${d.deptName}">计算机科学与技术系</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function editMajor(btn) {
            document.getElementById('majorModalTitle').textContent = '编辑专业';
            document.getElementById('majorId').value = btn.dataset.id;
            document.getElementById('majorName').value = btn.dataset.name;
            document.getElementById('majorDeptId').value = btn.dataset.dept;
        }

        function resetModal() {
            document.getElementById('majorModalTitle').textContent = '添加专业';
            document.getElementById('majorForm').reset();
            document.getElementById('majorId').value = '';
        }
    </script>
</body>
</html>
